<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Conexiones Fluidas (Triángulo) -->
  <path 
    d="M50 20 L80 75 L20 75 Z" 
    stroke="#10b981" 
    stroke-width="12" 
    stroke-linejoin="round" 
    opacity="0.2"
  />
  
  <!-- Nodos Nucleares -->
  <circle cx="50" cy="20" r="12" fill="#059669" />
  <circle cx="80" cy="75" r="12" fill="#2563eb" />
  <circle cx="20" cy="75" r="12" fill="#059669" />
  
  <!-- Detalle interno (Reflejo) -->
  <circle cx="50" cy="20" r="4" fill="white" fill-opacity="0.4" />
</svg>